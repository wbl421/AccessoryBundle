name: AccessoryBundle
options:
  bundleIdPrefix: com.skanie
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  AccessoryBundle:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Features
      - Resources
    dependencies:
      - package: CoreXLSX
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: "需要访问相册以保存海报图片"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skanie.accessorybundle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

packages:
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX
    from: "0.14.0"
